services:
  attic:
    image: ghcr.io/zhaofengli/attic:latest
    container_name: ${COMPOSE_PROJECT_NAME}-attic
    command: ["-f", "/attic/server.toml", "--mode", "monolithic"]
    restart: unless-stopped
    volumes:
      - ./attic/server.toml:/attic/server.toml:ro
      - attic-storage:/attic/storage
      - attic-db:/attic/data
    ports:
      - "127.0.0.1:${ATTIC_PORT}:8080"
    environment:
      # HS256 secret for JWT signing — generated by install.sh
      ATTIC_SERVER_TOKEN_HS256_SECRET_BASE64: "${ATTIC_TOKEN_SECRET}"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  attic-storage:
    name: ${COMPOSE_PROJECT_NAME}-attic-storage
    external: true
  attic-db:
    name: ${COMPOSE_PROJECT_NAME}-attic-db
    external: true

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME}-net
    external: true