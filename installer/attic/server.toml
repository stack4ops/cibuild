# Attic Server Configuration — Lab Setup

listen = "[::]:8080"

# empty = allow all (ok for lab)
allowed-hosts = []

[database]
url = "sqlite:///attic/data/attic.db?mode=rwc"

[storage]
type = "local"
path = "/attic/storage"

[chunking]
nar-size-threshold = 65536  # 64 KiB
min-size = 16384             # 16 KiB
avg-size = 65536             # 64 KiB
max-size = 262144            # 256 KiB

[compression]
type = "zstd"

[garbage-collection]
interval = "12 hours"
default-retention-period = "6 months"